<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicketMasterJunior - Panell de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-ticket-perforated-fill me-2"></i>TicketMasterJunior</a>
    </div>
</nav>

<div class="container">

    <div class="row g-4 mb-5">
        <div class="col-12 col-sm-6 col-lg-3">
            <a href="esdeveniments.html" class="card-link">
                <div class="card dashboard-card bg-pastel-blau p-3 shadow-sm">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-uppercase mb-1 fw-bold">Esdeveniments</h6>
                            <h2 class="mb-0 fw-bold" id="count-esdeveniments">0</h2>
                        </div>
                        <div class="icon-box bg-white shadow-sm"><i class="bi bi-music-note-list"></i></div>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <a href="llocs.html" class="card-link">
                <div class="card dashboard-card bg-pastel-groc p-3 shadow-sm">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-uppercase mb-1 fw-bold">Llocs</h6>
                            <h2 class="mb-0 fw-bold" id="count-llocs">0</h2>
                        </div>
                        <div class="icon-box bg-white shadow-sm"><i class="bi bi-geo-alt-fill"></i></div>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <a href="usuaris.html" class="card-link">
                <div class="card dashboard-card bg-pastel-verd p-3 shadow-sm">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-uppercase mb-1 fw-bold">Usuaris - Pokemons (canviar)</h6>
                            <h2 class="mb-0 fw-bold" id="count-usuaris">0</h2>
                        </div>
                        <div class="icon-box bg-white shadow-sm"><i class="bi bi-people-fill"></i></div>
                    </div>
                </div>
            </a>
        </div>

        <div class="col-12 col-sm-6 col-lg-3">
            <a href="tickets.html" class="card-link">
                <div class="card dashboard-card bg-pastel-vermell p-3 shadow-sm">
                    <div class="d-flex align-items-center justify-content-between">
                        <div>
                            <h6 class="text-uppercase mb-1 fw-bold">Tickets Venuts</h6>
                            <h2 class="mb-0 fw-bold" id="count-tickets">0</h2>
                        </div>
                        <div class="icon-box bg-white shadow-sm"><i class="bi bi-ticket-detailed-fill"></i></div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <div class="p-4 mb-5 table-container">
        <h4 class="mb-4 fw-bold text-secondary">Pròxims Esdeveniments</h4>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th scope="col">Nom</th>
                    <th scope="col">Altura</th>
                    <th scope="col">Data</th>
                    <th scope="col">Preu Base</th>
<!--                    <th scope="col">Entrades Venudes</th>-->
                </tr>
                </thead>
                <tbody id="taula-esdeveniments">
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="app.js"></script>
</body>
</html>
